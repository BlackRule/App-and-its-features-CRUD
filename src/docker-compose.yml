version: '3.7'

services:
  pg:
    image: postgres:11.2
    container_name: pg
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgresql.data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    restart: always
  app:
    image: golang:1.13.4
    volumes:
      - .:/src
    working_dir: /src
    command: ["go","build","-o","exe","main.go"]
    stdin_open: true
    tty: true